<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    
    <title>Fake Video Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* ป้องกันการเด้งหรือเลื่อนหน้าจอเวลาลากนิ้ว */
            overscroll-behavior-y: none;
        }

        /* ภาพพื้นหลัง (อีกฝ่าย) */
        #remote-media {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* เลเยอร์ไล่สีดำ */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 20%, rgba(0,0,0,0) 80%, rgba(0,0,0,0.7) 100%);
            z-index: 20;
            pointer-events: none;
        }

        /* กล้องของเรา */
        #local-video {
            width: 100px;
            height: 150px;
            object-fit: cover;
            position: absolute;
            bottom: 120px;
            right: 20px;
            z-index: 30;
            border-radius: 12px;
            background-color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transform: scaleX(-1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* ข้อความแจ้งเตือนกล้อง */
        #camera-status {
            width: 100px;
            height: 150px;
            position: absolute;
            bottom: 120px;
            right: 20px;
            z-index: 31;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            text-align: center;
            padding: 10px;
            pointer-events: none;
            background-color: rgba(50, 50, 50, 0.8);
            line-height: 1.4;
        }

        /* ปุ่มกด */
        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            z-index: 30;
        }
        
        .control-btn:active {
            transform: scale(0.9);
        }

        .btn-dark { background-color: rgba(60, 60, 60, 0.7); color: white; }
        .btn-red { background-color: #ff3b30; color: white; }
        .btn-green { background-color: #34c759; color: white; }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(52, 199, 89, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }
        .animate-ring { animation: pulse-ring 2s infinite; }
    </style>
</head>
<body>

    <div id="setup-screen" class="absolute inset-0 z-50 bg-gray-900 text-white p-6 flex flex-col justify-center items-center overflow-y-auto">
        <h1 class="text-3xl font-bold mb-8 text-pink-400">สร้างสายวิดีโอคอลจำลอง</h1>
        
        <div class="w-full max-w-sm space-y-5 bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">ชื่อคนโทร</label>
                <input type="text" id="input-name" placeholder="เช่น ที่รัก 💕" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-pink-500 text-white">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">รูปโปรไฟล์ (ตอนสายเข้า)</label>
                <input type="file" id="input-avatar" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-pink-500 file:text-white hover:file:bg-pink-600 cursor-pointer">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">วิดีโอ (ตอนรับสายแล้ว)</label>
                <input type="file" id="input-video" accept="video/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-500 file:text-white hover:file:bg-blue-600 cursor-pointer">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">หน่วงเวลา (วินาที)</label>
                <input type="number" id="input-delay" value="0" min="0" placeholder="0 = สายเข้าทันที" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:border-pink-500 text-white">
            </div>

            <button onclick="simulateCall()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-xl mt-4 transition-all transform active:scale-95 shadow-lg">
                📞 เริ่มจำลองสายเข้า (เต็มจอ)
            </button>
        </div>
    </div>

    <div id="standby-screen" class="hidden absolute inset-0 z-50 bg-black flex flex-col items-center justify-center text-gray-600 cursor-pointer" onclick="cancelStandby()">
        <p>หน้าจอปิดอยู่</p>
        <p class="text-xs mt-2">(แตะเพื่อยกเลิกการรอสาย)</p>
    </div>

    <div id="incoming-screen" class="hidden absolute inset-0 z-40 bg-gray-800 text-white flex flex-col items-center justify-between py-20">
        <div class="flex flex-col items-center mt-10">
            <img id="incoming-avatar" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400&q=80" alt="Avatar" class="w-32 h-32 rounded-full object-cover border-4 border-gray-600 shadow-2xl mb-4">
            <h2 id="incoming-name" class="text-3xl font-medium tracking-wide">ไม่ระบุชื่อ</h2>
            <p class="text-gray-400 mt-2 text-lg">กำลังโทรทางวิดีโอ...</p>
        </div>

        <div class="flex gap-16 mb-10">
            <div class="flex flex-col items-center gap-2">
                <div class="control-btn btn-red" onclick="cancelCall()">
                    <i data-lucide="phone" style="transform: rotate(135deg); width: 28px; height: 28px;"></i>
                </div>
                <span class="text-sm font-medium">ปฏิเสธ</span>
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <div class="control-btn btn-green animate-ring" onclick="acceptCall()">
                    <i data-lucide="phone" style="width: 28px; height: 28px;"></i>
                </div>
                <span class="text-sm font-medium">รับสาย</span>
            </div>
        </div>
    </div>

    <div id="call-screen" class="hidden absolute inset-0 z-30">
        <video id="remote-media" autoplay loop playsinline class="w-full h-full object-cover absolute top-0 left-0 z-10"></video>
        <div class="overlay"></div>

        <div class="absolute top-12 w-full text-center text-white z-30 drop-shadow-md">
            <h2 id="call-name" class="text-2xl font-medium tracking-wide">ไม่ระบุชื่อ</h2>
            <p id="timer" class="text-base mt-1 font-light opacity-90">00:00</p>
        </div>
        
        <video id="local-video" autoplay playsinline muted></video>
        <div id="camera-status">กำลังโหลดกล้อง...</div>

        <div class="absolute bottom-10 w-full flex justify-center items-center gap-6 z-30 pb-safe">
            <div class="control-btn btn-dark" onclick="toggleMute(this)">
                <i data-lucide="mic" id="mic-icon"></i>
            </div>
            <div class="control-btn btn-red" onclick="endCall()">
                <i data-lucide="phone" style="transform: rotate(135deg); width: 28px; height: 28px;"></i>
            </div>
            <div class="control-btn btn-dark" onclick="toggleVideo(this)">
                <i data-lucide="video" id="video-icon"></i>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let customName = "ผู้ติดต่อ";
        let avatarUrl = "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=400&q=80"; 
        let videoUrl = "";

        const setupScreen = document.getElementById('setup-screen');
        const incomingScreen = document.getElementById('incoming-screen');
        const callScreen = document.getElementById('call-screen');
        const standbyScreen = document.getElementById('standby-screen');
        
        let callTimeout;

        // ฟังก์ชันสั่งให้เว็บทำงานเต็มหน้าจอ (ซ่อนแถบ URL)
        function requestFullScreen() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen().catch(err => console.log(err));
            } else if (docElm.webkitRequestFullscreen) { /* Safari */
                docElm.webkitRequestFullscreen().catch(err => console.log(err));
            }
        }

        function exitFullScreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(err => console.log(err));
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen().catch(err => console.log(err));
            }
        }

        function simulateCall() {
            // ขอเข้า Fullscreen ทันทีที่กดปุ่ม
            requestFullScreen();

            const nameInput = document.getElementById('input-name').value;
            if (nameInput.trim() !== "") customName = nameInput;
            
            const avatarFile = document.getElementById('input-avatar').files[0];
            if (avatarFile) avatarUrl = URL.createObjectURL(avatarFile);
            
            const videoFile = document.getElementById('input-video').files[0];
            if (videoFile) {
                videoUrl = URL.createObjectURL(videoFile);
            } else {
                alert("กรุณาเลือกไฟล์วิดีโอ (สำหรับเล่นตอนรับสาย) ก่อนครับ");
                return;
            }

            document.getElementById('incoming-name').innerText = customName;
            document.getElementById('incoming-avatar').src = avatarUrl;
            document.getElementById('call-name').innerText = customName;
            document.getElementById('remote-media').src = videoUrl;

            const delayTime = parseInt(document.getElementById('input-delay').value) || 0;

            setupScreen.classList.add('hidden');
            
            if (delayTime > 0) {
                standbyScreen.classList.remove('hidden');
                callTimeout = setTimeout(() => {
                    standbyScreen.classList.add('hidden');
                    incomingScreen.classList.remove('hidden');
                }, delayTime * 1000);
            } else {
                incomingScreen.classList.remove('hidden');
            }
        }

        function cancelStandby() {
            clearTimeout(callTimeout);
            standbyScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
            exitFullScreen();
        }

        function cancelCall() {
            incomingScreen.classList.add('hidden');
            if(videoUrl) URL.revokeObjectURL(videoUrl);
            
            document.body.style.backgroundColor = "black";
            document.body.innerHTML = "";
            exitFullScreen();
            window.close();
        }

        function acceptCall() {
            incomingScreen.classList.add('hidden');
            callScreen.classList.remove('hidden');
            
            document.getElementById('remote-media').play();
            startCamera();
            timerInterval = setInterval(updateTimer, 1000);
        }

        let seconds = 0;
        let timerInterval;

        function updateTimer() {
            seconds++;
            const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
            const secs = String(seconds % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }

        const localVideo = document.getElementById('local-video');
        const cameraStatus = document.getElementById('camera-status');
        let currentStream = null;

        async function startCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                cameraStatus.innerText = "ไม่สามารถเปิดกล้องได้\nต้องเปิดลิงก์แบบ HTTPS";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                currentStream = stream;
                localVideo.srcObject = stream;
                
                localVideo.onloadedmetadata = () => {
                    cameraStatus.style.display = 'none';
                };
            } catch (err) {
                cameraStatus.innerText = "ไม่สามารถเข้าถึงกล้องได้";
            }
        }

        let isMuted = false;
        function toggleMute(btn) {
            isMuted = !isMuted;
            const icon = document.getElementById('mic-icon');
            if(isMuted) {
                btn.style.backgroundColor = "rgba(255, 255, 255, 0.9)";
                btn.style.color = "black";
                icon.setAttribute("data-lucide", "mic-off");
            } else {
                btn.style.backgroundColor = "rgba(60, 60, 60, 0.7)";
                btn.style.color = "white";
                icon.setAttribute("data-lucide", "mic");
            }
            lucide.createIcons();
        }

        let isVideoOff = false;
        function toggleVideo(btn) {
            isVideoOff = !isVideoOff;
            const icon = document.getElementById('video-icon');
            
            if(isVideoOff) {
                btn.style.backgroundColor = "rgba(255, 255, 255, 0.9)";
                btn.style.color = "black";
                icon.setAttribute("data-lucide", "video-off");
                localVideo.style.opacity = '0';
                cameraStatus.style.display = 'flex';
                cameraStatus.innerText = "กล้องปิดอยู่";
            } else {
                btn.style.backgroundColor = "rgba(60, 60, 60, 0.7)";
                btn.style.color = "white";
                icon.setAttribute("data-lucide", "video");
                localVideo.style.opacity = '1';
                cameraStatus.style.display = 'none';
            }
            lucide.createIcons();
        }

        function endCall() {
            clearInterval(timerInterval);
            document.getElementById('timer').innerText = "สิ้นสุดการสนทนา";
            
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }

            document.getElementById('remote-media').pause();

            setTimeout(() => {
                callScreen.classList.add('hidden');
                if(videoUrl) URL.revokeObjectURL(videoUrl);
                
                document.body.style.backgroundColor = "black";
                document.body.innerHTML = "";
                exitFullScreen();
                window.close();
            }, 1500);
        }
    </script>
</body>
</html>
